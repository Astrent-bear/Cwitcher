name: Feature request
description: Suggest an improvement or a new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem and the expected user experience.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is difficult, missing, or inconvenient today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want to see
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Describe any workarounds or alternatives you considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Target apps, layout combinations, UX examples, screenshots, or references
